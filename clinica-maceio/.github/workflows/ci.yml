name: CI - ClinicaMaceió Build & Tests

on:
  push:
    branches: [ "main", "feat/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build do projeto com Maven
        run: mvn clean compile --no-transfer-progress

      - name: 🧪 Rodar todos os testes (TDD)
        run: mvn test --no-transfer-progress

      - name: 📊 Publicar resultado dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Relatório JUnit
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false
